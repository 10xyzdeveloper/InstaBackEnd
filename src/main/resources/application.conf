ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.instagram.ApplicationKt.module ]
    }
}

jwt {
    secret      = "change-me-in-production-use-env-var"
    secret      = ${?JWT_SECRET}
    issuer      = "com.instagram"
    audience    = "instagram-users"
    realm       = "instagram"
    accessExpiry  = 900       # 15 minutes
    refreshExpiry = 2592000   # 30 days
}

database {
    url      = "jdbc:postgresql://localhost:5432/instagram"
    url      = ${?DATABASE_URL}
    user     = "postgres"
    user     = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    driver   = "org.postgresql.Driver"
    pool     = 10
}

aws {
    bucket   = "instagram-media-dev"
    bucket   = ${?AWS_S3_BUCKET}
    region   = "us-east-1"
    region   = ${?AWS_REGION}
}
